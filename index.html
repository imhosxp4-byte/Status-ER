<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ER Status — หน้าหลัก</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-8px); }
    }
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(99,102,241,0.5); }
      100% { box-shadow: 0 0 0 20px rgba(99,102,241,0); }
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.3;} }

    html,body { height:100%; margin:0; font-family:'Segoe UI','Noto Sans Thai',sans-serif; }
    body {
      background: radial-gradient(ellipse at 20% 50%, #1e1b4b 0%, #0f172a 50%, #0c1a2e 100%);
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; overflow:hidden;
    }

    /* Animated background dots */
    .bg-dots {
      position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0;
    }
    .dot {
      position:absolute; border-radius:50%;
      background:rgba(99,102,241,0.12);
      animation: float 6s ease-in-out infinite;
    }

    .glass-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white; border: none;
      box-shadow: 0 4px 20px rgba(99,102,241,0.45);
      transition: all .2s ease;
    }
    .btn-primary:hover  { transform:translateY(-2px); box-shadow:0 8px 28px rgba(99,102,241,0.6); }
    .btn-primary:active { transform:translateY(0); }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.85);
      border: 1.5px solid rgba(255,255,255,0.18);
      transition: all .2s ease;
    }
    .btn-secondary:hover  { background:rgba(255,255,255,0.14); transform:translateY(-2px); }
    .btn-secondary:active { transform:translateY(0); }
    .btn-secondary:disabled {
      opacity:.35; cursor:not-allowed; transform:none !important;
    }

    .status-dot { animation: blink 2s ease-in-out infinite; }
    .logo-pulse  { animation: pulse-ring 2s ease-out infinite; }
  </style>
</head>
<body>

  <!-- Animated background -->
  <div class="bg-dots" id="bgDots"></div>

  <!-- Main card -->
  <div class="glass-card w-full max-w-md mx-4 p-10 text-center relative z-10">

    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <div class="logo-pulse w-24 h-24 rounded-2xl flex items-center justify-center
                  text-white font-black text-4xl shadow-xl select-none"
           style="background:linear-gradient(135deg,#ef4444,#dc2626)">
        H+
      </div>
    </div>

    <!-- Title -->
    <h1 class="text-white font-black text-2xl leading-tight mb-1">
      ระบบแสดงสถานะห้องฉุกเฉิน
    </h1>
    <p class="text-indigo-300 text-sm mb-8">Emergency Room Status System</p>

    <!-- Connection status badge -->
    <div id="connStatus"
         class="inline-flex items-center gap-2 rounded-full px-4 py-2 text-sm font-semibold mb-8
                bg-red-900/40 border border-red-700/50 text-red-300">
      <span class="status-dot w-2 h-2 rounded-full bg-red-400 inline-block"></span>
      <span id="connStatusText">ยังไม่ได้ตั้งค่าการเชื่อมต่อ</span>
    </div>

    <!-- DB info summary (shown when configured) -->
    <div id="dbSummary" class="hidden mb-6 rounded-xl p-4 text-left
                               bg-white/5 border border-white/10">
      <div class="text-xs text-gray-400 mb-2 font-semibold uppercase tracking-wide">
        ข้อมูลการเชื่อมต่อปัจจุบัน
      </div>
      <div class="grid grid-cols-2 gap-1 text-sm" id="dbSummaryContent"></div>
    </div>

    <!-- Action buttons -->
    <div class="flex flex-col gap-3">
      <button onclick="location.href='settings.html'"
              class="btn-primary w-full rounded-2xl py-4 font-bold text-base
                     flex items-center justify-center gap-3 cursor-pointer">
        <span class="text-xl">⚙</span>
        ตั้งค่าการเชื่อมต่อฐานข้อมูล
      </button>

      <button id="btnDashboard"
              onclick="location.href='dashboard.html'"
              class="btn-secondary w-full rounded-2xl py-4 font-bold text-base
                     flex items-center justify-center gap-3 cursor-pointer"
              disabled>
        <span class="text-xl">🖥</span>
        เข้าสู่หน้าแสดงสถานะ ER
      </button>
    </div>

    <!-- Version -->
    <div class="mt-8 text-xs text-indigo-400/60">
      ER Status System v1.0 · Powered by H+
    </div>
  </div>

  <script>
    /* ── Animated background dots ── */
    const container = document.getElementById('bgDots');
    for (let i = 0; i < 12; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      const size = Math.random() * 120 + 40;
      d.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%; top:${Math.random()*100}%;
        animation-delay:${Math.random()*4}s;
        animation-duration:${5+Math.random()*4}s;
        opacity:${0.3+Math.random()*0.4};
      `;
      container.appendChild(d);
    }

    /* ── Load connection config from localStorage ── */
    function loadConnStatus() {
      const cfg = JSON.parse(localStorage.getItem('erStatus_db') || 'null');
      const statusEl  = document.getElementById('connStatus');
      const textEl    = document.getElementById('connStatusText');
      const summaryEl = document.getElementById('dbSummary');
      const summaryContent = document.getElementById('dbSummaryContent');
      const dashBtn   = document.getElementById('btnDashboard');

      if (cfg && cfg.host) {
        statusEl.className = `inline-flex items-center gap-2 rounded-full px-4 py-2
                              text-sm font-semibold mb-8
                              bg-green-900/40 border border-green-600/50 text-green-300`;
        textEl.textContent = 'ตั้งค่าการเชื่อมต่อแล้ว';

        summaryEl.classList.remove('hidden');
        summaryContent.innerHTML = `
          <div class="text-gray-400">ฐานข้อมูล</div>
          <div class="text-white font-semibold">${cfg.dbType?.toUpperCase() || '–'}</div>
          <div class="text-gray-400">Server</div>
          <div class="text-white font-semibold">${cfg.host}:${cfg.port}</div>
          <div class="text-gray-400">Database</div>
          <div class="text-white font-semibold">${cfg.database}</div>
          <div class="text-gray-400">Username</div>
          <div class="text-white font-semibold">${cfg.username}</div>
        `;

        dashBtn.disabled = false;
        dashBtn.classList.remove('opacity-35');
      } else {
        dashBtn.disabled = true;
      }
    }

    loadConnStatus();
  </script>
</body>
</html>
