<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ตั้งค่าการเชื่อมต่อ — ER Status</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeIn { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }
    @keyframes spin    { to{transform:rotate(360deg);} }
    @keyframes blink   { 0%,100%{opacity:1;} 50%{opacity:.2;} }

    html,body { height:100%; margin:0; font-family:'Segoe UI','Noto Sans Thai',sans-serif; background:#0f172a; }

    .page-enter { animation:fadeIn .35s ease-out both; }

    /* Input fields */
    .db-input {
      width:100%; background:rgba(255,255,255,0.07);
      border:1.5px solid rgba(255,255,255,0.14);
      border-radius:12px; padding:12px 14px;
      color:#f1f5f9; font-size:0.95rem;
      outline:none; transition:all .2s;
    }
    .db-input:focus  { border-color:#6366f1; background:rgba(99,102,241,0.1); box-shadow:0 0 0 3px rgba(99,102,241,0.2); }
    .db-input::placeholder { color:#475569; }

    /* DB type tabs */
    .db-tab {
      flex:1; py:3; display:flex; align-items:center; justify-content:center;
      gap:8px; padding:12px 16px; border-radius:12px;
      font-weight:700; font-size:.95rem; cursor:pointer;
      border:2px solid transparent; transition:all .2s;
      color:rgba(255,255,255,0.5);
    }
    .db-tab.active-mysql    { background:rgba(234,88,12,0.2);  border-color:#ea580c; color:#fb923c; }
    .db-tab.active-postgres { background:rgba(59,130,246,0.2); border-color:#3b82f6; color:#60a5fa; }
    .db-tab:not(.active-mysql):not(.active-postgres):hover { background:rgba(255,255,255,0.06); }

    /* Buttons */
    .btn-test {
      background:rgba(99,102,241,0.15); color:#a5b4fc;
      border:1.5px solid rgba(99,102,241,0.4);
      border-radius:14px; padding:14px 24px;
      font-weight:700; font-size:.95rem; cursor:pointer;
      transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-test:hover { background:rgba(99,102,241,0.25); border-color:#6366f1; }
    .btn-test:disabled { opacity:.4; cursor:not-allowed; }

    .btn-save {
      background:linear-gradient(135deg,#22c55e,#16a34a); color:white;
      border:none; border-radius:14px; padding:14px 24px;
      font-weight:800; font-size:.95rem; cursor:pointer;
      box-shadow:0 4px 20px rgba(34,197,94,0.4); transition:all .2s;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-save:hover  { transform:translateY(-2px); box-shadow:0 8px 28px rgba(34,197,94,0.5); }
    .btn-save:active { transform:translateY(0); }

    /* Input label */
    .field-label { display:block; color:#94a3b8; font-size:.8rem; font-weight:600;
                   text-transform:uppercase; letter-spacing:.07em; margin-bottom:6px; }

    /* Password toggle */
    .pw-wrap { position:relative; }
    .pw-wrap .db-input { padding-right:44px; }
    .pw-toggle {
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      color:#64748b; cursor:pointer; font-size:1.1rem; user-select:none;
      transition:color .15s;
    }
    .pw-toggle:hover { color:#94a3b8; }

    /* Test result badge */
    .test-result {
      border-radius:10px; padding:10px 14px;
      font-size:.88rem; font-weight:600; display:flex; align-items:center; gap:8px;
    }
    .test-ok  { background:rgba(34,197,94,.15);  border:1px solid rgba(34,197,94,.4);  color:#4ade80; }
    .test-err { background:rgba(239,68,68,.15);  border:1px solid rgba(239,68,68,.4);  color:#f87171; }
    .test-ing { background:rgba(99,102,241,.15); border:1px solid rgba(99,102,241,.4); color:#a5b4fc; }

    /* Spinner */
    .spinner {
      width:16px; height:16px; border:2px solid rgba(165,180,252,.3);
      border-top-color:#a5b4fc; border-radius:50%;
      animation:spin .7s linear infinite; display:inline-block; flex-shrink:0;
    }

    /* Section card */
    .section-card {
      background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.09);
      border-radius:18px; padding:24px;
    }
  </style>
</head>

<body class="text-white min-h-screen">

  <!-- ── Header ────────────────────────────────────────── -->
  <header class="sticky top-0 z-30 bg-slate-900/90 backdrop-blur border-b border-white/10 px-6 py-3">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button onclick="location.href='index.html'"
                class="w-9 h-9 rounded-xl bg-white/8 hover:bg-white/15 flex items-center
                       justify-center text-gray-400 hover:text-white transition-all font-bold text-lg">
          ←
        </button>
        <div>
          <div class="font-bold text-base leading-tight">ตั้งค่าการเชื่อมต่อฐานข้อมูล</div>
          <div class="text-xs text-slate-400">Database Connection Settings</div>
        </div>
      </div>
      <div class="w-9 h-9 rounded-xl flex items-center justify-center font-black text-base select-none"
           style="background:linear-gradient(135deg,#ef4444,#dc2626)">H+</div>
    </div>
  </header>

  <!-- ── Main Form ──────────────────────────────────────── -->
  <main class="max-w-2xl mx-auto px-4 py-8 page-enter">

    <!-- DB Type Selector -->
    <div class="section-card mb-5">
      <div class="field-label mb-4">เลือกประเภทฐานข้อมูล</div>
      <div class="flex gap-3">
        <div class="db-tab active-mysql" id="tabMySQL" onclick="selectDbType('mysql')">
          <span class="text-2xl">🐬</span>
          <div class="text-left">
            <div class="font-black">MySQL</div>
            <div class="text-xs opacity-70 font-normal">Port เริ่มต้น 3306</div>
          </div>
        </div>
        <div class="db-tab" id="tabPG" onclick="selectDbType('postgres')">
          <span class="text-2xl">🐘</span>
          <div class="text-left">
            <div class="font-black">PostgreSQL</div>
            <div class="text-xs opacity-70 font-normal">Port เริ่มต้น 5432</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Connection Fields -->
    <div class="section-card mb-5">
      <div class="text-sm font-bold text-slate-300 mb-5 flex items-center gap-2">
        <span class="text-lg">🔌</span> ข้อมูลการเชื่อมต่อ
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">

        <!-- IP Server -->
        <div class="sm:col-span-2">
          <label class="field-label">IP Server / Hostname</label>
          <input id="fHost" type="text" class="db-input"
                 placeholder="เช่น 192.168.1.100 หรือ localhost" autocomplete="off" />
        </div>

        <!-- Port -->
        <div>
          <label class="field-label">Port</label>
          <input id="fPort" type="number" class="db-input" value="3306"
                 placeholder="3306" />
        </div>

        <!-- Database -->
        <div>
          <label class="field-label">Database Name</label>
          <input id="fDatabase" type="text" class="db-input"
                 placeholder="เช่น er_system" autocomplete="off" />
        </div>

        <!-- Username -->
        <div>
          <label class="field-label">Username</label>
          <input id="fUser" type="text" class="db-input"
                 placeholder="เช่น root" autocomplete="off" />
        </div>

        <!-- Password -->
        <div>
          <label class="field-label">Password</label>
          <div class="pw-wrap">
            <input id="fPass" type="password" class="db-input"
                   placeholder="••••••••" autocomplete="new-password" />
            <span class="pw-toggle" onclick="togglePw()" id="pwEye">👁</span>
          </div>
        </div>

      </div>
    </div>

    <!-- Test Result (hidden by default) -->
    <div id="testResult" class="hidden mb-4"></div>

    <!-- Action Buttons -->
    <div class="flex flex-col sm:flex-row gap-3">

      <button id="btnTest" class="btn-test flex-1" onclick="testConnection()">
        <span id="testIcon">🔍</span>
        <span id="testLabel">ทดสอบการเชื่อมต่อ</span>
      </button>

      <button class="btn-save flex-1" onclick="saveAndGo()">
        <span>💾</span>
        <span>บันทึกและเข้าสู่ระบบ</span>
      </button>

    </div>

    <!-- Hint -->
    <p class="text-center text-xs text-slate-500 mt-5">
      ข้อมูลการเชื่อมต่อจะถูกบันทึกในเบราว์เซอร์ (localStorage) เท่านั้น
    </p>

  </main>

  <script>
    let dbType = 'mysql';

    /* ── Load saved settings ── */
    (function init() {
      const cfg = JSON.parse(localStorage.getItem('erStatus_db') || 'null');
      if (!cfg) return;
      if (cfg.dbType) selectDbType(cfg.dbType, true);
      setVal('fHost',     cfg.host     || '');
      setVal('fPort',     cfg.port     || (cfg.dbType === 'postgres' ? '5432' : '3306'));
      setVal('fDatabase', cfg.database || '');
      setVal('fUser',     cfg.username || '');
      setVal('fPass',     cfg.password || '');
    })();

    function setVal(id, v) { document.getElementById(id).value = v; }
    function getVal(id)    { return document.getElementById(id).value.trim(); }

    /* ── DB type toggle ── */
    function selectDbType(type, silent = false) {
      dbType = type;
      const tMySQL = document.getElementById('tabMySQL');
      const tPG    = document.getElementById('tabPG');

      tMySQL.className = 'db-tab' + (type === 'mysql'    ? ' active-mysql'    : '');
      tPG.className    = 'db-tab' + (type === 'postgres' ? ' active-postgres' : '');

      if (!silent) {
        const port = document.getElementById('fPort');
        if (!port.value || port.value === '3306' || port.value === '5432') {
          port.value = type === 'postgres' ? '5432' : '3306';
        }
        clearTestResult();
      }
    }

    /* ── Password toggle ── */
    function togglePw() {
      const el = document.getElementById('fPass');
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    /* ── Validate form ── */
    function validate() {
      const required = [
        { id:'fHost',     label:'IP Server' },
        { id:'fPort',     label:'Port' },
        { id:'fDatabase', label:'Database' },
        { id:'fUser',     label:'Username' },
      ];
      for (const f of required) {
        if (!getVal(f.id)) {
          showTestResult('err', `⚠ กรุณากรอก ${f.label}`);
          document.getElementById(f.id).focus();
          return false;
        }
      }
      return true;
    }

    const API_BASE = 'http://localhost:4000';

    function buildCfg() {
      return {
        dbType:   dbType,
        host:     getVal('fHost'),
        port:     getVal('fPort'),
        database: getVal('fDatabase'),
        username: getVal('fUser'),
        password: getVal('fPass'),
        savedAt:  new Date().toISOString(),
      };
    }

    /* ── Test connection — calls real backend API ── */
    async function testConnection() {
      if (!validate()) return;
      const btn = document.getElementById('btnTest');
      btn.disabled = true;
      document.getElementById('testIcon').innerHTML = '<span class="spinner"></span>';
      document.getElementById('testLabel').textContent = 'กำลังทดสอบ...';
      showTestResult('ing',
        `<span class="spinner"></span> กำลังเชื่อมต่อ ${dbType.toUpperCase()} @ ${getVal('fHost')}:${getVal('fPort')} ...`
      );

      try {
        const resp = await fetch(`${API_BASE}/api/test`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(buildCfg()),
        });
        const json = await resp.json();
        if (json.ok) {
          showTestResult('ok',
            `✅ เชื่อมต่อสำเร็จ — ${dbType.toUpperCase()} @ ${getVal('fHost')}:${getVal('fPort')} / ${getVal('fDatabase')}`
          );
        } else {
          showTestResult('err', `❌ ${json.message || 'เชื่อมต่อไม่สำเร็จ'}`);
        }
      } catch {
        showTestResult('err',
          '❌ ไม่พบ Server — กรุณาเปิด <b>start.bat</b> ก่อน แล้วลองใหม่'
        );
      } finally {
        btn.disabled = false;
        document.getElementById('testIcon').textContent = '🔍';
        document.getElementById('testLabel').textContent = 'ทดสอบการเชื่อมต่อ';
      }
    }

    /* ── Save config to server + localStorage → redirect ── */
    async function saveAndGo() {
      if (!validate()) return;
      const cfg = buildCfg();

      showTestResult('ing', '<span class="spinner"></span> กำลังบันทึก...');

      try {
        /* 1. POST to backend so server.js writes config.json */
        const resp = await fetch(`${API_BASE}/api/config`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(cfg),
        });
        const json = await resp.json();
        if (!json.ok) throw new Error(json.error);
      } catch (e) {
        /* If server not running yet, still save locally */
        console.warn('Server unreachable, saving to localStorage only:', e.message);
      }

      /* 2. Always save to localStorage for landing page */
      localStorage.setItem('erStatus_db', JSON.stringify(cfg));

      showTestResult('ok', '✅ บันทึกสำเร็จ — กำลังเข้าสู่ระบบ...');
      setTimeout(() => location.href = 'dashboard.html', 800);
    }

    /* ── UI helpers ── */
    function showTestResult(type, msg) {
      const el = document.getElementById('testResult');
      el.className = `test-result mb-4 ${
        type === 'ok'  ? 'test-ok'  :
        type === 'err' ? 'test-err' :
                         'test-ing'
      }`;
      el.innerHTML  = msg;
      el.classList.remove('hidden');
    }

    function clearTestResult() {
      document.getElementById('testResult').classList.add('hidden');
    }
  </script>
</body>
</html>
